<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MJT Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            mjt: {
              bg: '#f6f8fc',
              card: '#ffffff',
              border: '#dbe3ef',
              text: '#172033',
              muted: '#64748b',
              primary: '#2563eb',
              cyan: '#06b6d4',
              green: '#16a34a',
              amber: '#d97706',
              red: '#dc2626'
            }
          },
          boxShadow: {
            soft: '0 18px 48px rgba(15, 23, 42, 0.08)'
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="styles/theme.css" />
</head>
<body class="bg-mjt-bg text-mjt-text">
  <div id="app"></div>
  <div id="toast" class="fixed right-6 top-6 hidden z-50 rounded-2xl border border-mjt-border bg-white px-4 py-3 shadow-soft text-sm"></div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
