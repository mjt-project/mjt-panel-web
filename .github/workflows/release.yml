name: Build panel release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static panel
        run: npm run build

      - name: Package dist
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          (cd dist && zip -r "../mjt-panel-web-${VERSION}.zip" .)

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" "mjt-panel-web-${VERSION}.zip" --generate-notes
