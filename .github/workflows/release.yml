name: Build panel release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run build
      - run: cd dist && zip -r ../mjt-panel-web-${{ github.ref_name }}.zip .
      - uses: softprops/action-gh-release@v2
        with:
          files: mjt-panel-web-${{ github.ref_name }}.zip
